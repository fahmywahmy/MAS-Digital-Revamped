<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Starting MAS Digital Revamped…</title>
  <style>
    :root { color-scheme: dark; }
    body { margin:0; min-height:100vh; display:grid; place-items:center;
           font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
           background:#0b0f14; color:#e6edf3; }
    .card { text-align:center; max-width:480px; padding:2rem 1.5rem; }
    .spinner { width:44px; height:44px; margin:0 auto 1.4rem;
               border:4px solid #1f2933; border-top-color:#3b82f6;
               border-radius:50%; animation:spin .9s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    h1 { font-size:1.15rem; font-weight:600; margin:0 0 .4rem; }
    p  { margin:.3rem 0; color:#9aa7b4; font-size:.9rem; }
    .muted { color:#5b6773; font-size:.8rem; margin-top:1.2rem; }
    a { color:#3b82f6; text-decoration:none; }
    a:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h1>Starting the dev server…</h1>
    <p id="status">Waiting for Next.js to finish its first compile.</p>
    <p class="muted">This page redirects automatically when it's ready — or open
      <a href="http://localhost:3000">localhost:3000</a> yourself.</p>
  </div>
  <script>
    const TARGET = "http://localhost:3000";
    const status = document.getElementById("status");
    let tries = 0;
    async function poll() {
      tries++;
      try {
        // no-cors: we only care that *something* answers on :3000.
        await fetch(TARGET, { mode: "no-cors", cache: "no-store" });
        status.textContent = "Ready — redirecting…";
        location.href = TARGET;
        return;
      } catch (e) {
        status.textContent = "Compiling… still waiting (attempt " + tries + ")";
      }
      setTimeout(poll, 1000);
    }
    setTimeout(poll, 1500);
  </script>
</body>
</html>
